<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Connect</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b0f1a;
color:white;
overflow-x:hidden;
}

/* animated gradient */
body::before{
content:'';
position:fixed;
width:600px;
height:600px;
background:linear-gradient(45deg,#00f0ff,#7a5cff);
filter:blur(120px);
opacity:.5;
top:-200px;
left:-200px;
animation:float 8s infinite alternate;
}

body::after{
content:'';
position:fixed;
width:600px;
height:600px;
background:linear-gradient(45deg,#ff00c8,#00ffcc);
filter:blur(120px);
opacity:.5;
bottom:-200px;
right:-200px;
animation:float 10s infinite alternate;
}

@keyframes float{
from{transform:translateY(0px)}
to{transform:translateY(80px)}
}

/* navbar */
.nav{
position:fixed;
top:0;
width:100%;
padding:20px 60px;
display:flex;
justify-content:space-between;
backdrop-filter:blur(20px);
background:rgba(255,255,255,.03);
z-index:999;
}

.logo{
font-weight:600;
font-size:20px;
}

/* hero */
.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
background:linear-gradient(90deg,#00f0ff,#7a5cff);
-webkit-background-clip:text;
color:transparent;
animation:fadeUp 1s ease;
}

.hero p{
opacity:.7;
margin-top:10px;
animation:fadeUp 1.4s ease;
}

.btn{
margin-top:25px;
padding:14px 30px;
border-radius:40px;
background:linear-gradient(90deg,#00f0ff,#7a5cff);
border:none;
color:white;
cursor:pointer;
transition:.3s;
animation:fadeUp 1.8s ease;
}

.btn:hover{
transform:scale(1.05);
}

/* glass cards */
.section{
padding:100px 20px;
text-align:center;
}

.cards{
display:flex;
gap:30px;
justify-content:center;
flex-wrap:wrap;
margin-top:40px;
}

.card{
width:300px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
background:rgba(255,255,255,.08);
}

.card h3{
margin-bottom:10px;
}

/* CTA */
.cta{
padding:120px 20px;
text-align:center;
}

.cta-box{
display:inline-block;
padding:50px;
border-radius:20px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
}

footer{
padding:40px;
text-align:center;
opacity:.5;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* responsive */
@media(max-width:768px){
.hero h1{
font-size:36px;
}
.nav{
padding:15px 20px;
}
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">QR Connect</div>
</div>

<section class="hero">
<h1>QR Connect</h1>
<p>Create Smart QR Business Profiles</p>
<button class="btn">Create Profile</button>
</section>

<section class="section">
<h2>Features</h2>

<div class="cards">

<div class="card">
<h3>Digital Profile</h3>
<p>Create your smart QR profile instantly</p>
</div>

<div class="card">
<h3>Share Anywhere</h3>
<p>Share your QR code across platforms</p>
</div>

<div class="card">
<h3>Analytics</h3>
<p>Track views and engagement</p>
</div>

</div>
</section>

<section class="cta">
<div class="cta-box">
<h2>Start using QR Connect</h2>
<button class="btn">Get Started</button>
</div>
</section>

<footer>
© 2026 QR Connect
</footer>

</body>
</html>
