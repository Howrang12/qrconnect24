<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Connect</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
background:#070b14;
color:white;
overflow-x:hidden;
}

/* animated blobs */
.blob{
position:fixed;
width:600px;
height:600px;
filter:blur(140px);
opacity:.5;
z-index:-1;
animation:float 12s infinite alternate ease-in-out;
}

.blob1{
background:#5b8cff;
top:-200px;
left:-200px;
}

.blob2{
background:#ff3cac;
bottom:-200px;
right:-200px;
animation-delay:2s;
}

.blob3{
background:#00ffd0;
top:40%;
left:40%;
animation-delay:4s;
}

@keyframes float{
from{transform:translateY(0px)}
to{transform:translateY(80px)}
}

/* navbar */
.nav{
position:fixed;
width:100%;
top:0;
padding:20px 40px;
display:flex;
justify-content:space-between;
backdrop-filter:blur(20px);
background:rgba(255,255,255,.03);
z-index:1000;
}

.logo{
font-weight:600;
font-size:18px;
}

/* hero */
.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:64px;
background:linear-gradient(90deg,#5b8cff,#00ffd0);
-webkit-background-clip:text;
color:transparent;
animation:fadeUp 1s ease;
}

.hero p{
opacity:.7;
margin-top:15px;
animation:fadeUp 1.5s ease;
}

.btn{
margin-top:25px;
padding:14px 28px;
border-radius:40px;
border:none;
background:linear-gradient(90deg,#5b8cff,#00ffd0);
color:white;
cursor:pointer;
transition:.3s;
animation:fadeUp 2s ease;
}

.btn:hover{
transform:scale(1.05);
}

/* sections */
.section{
padding:120px 20px;
text-align:center;
}

.cards{
display:flex;
gap:30px;
flex-wrap:wrap;
justify-content:center;
margin-top:40px;
}

.card{
width:280px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,.04);
backdrop-filter:blur(20px);
transition:.4s;
opacity:0;
transform:translateY(40px);
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:translateY(-8px);
background:rgba(255,255,255,.08);
}

.cta{
padding:140px 20px;
text-align:center;
}

.cta-box{
display:inline-block;
padding:60px;
border-radius:20px;
background:rgba(255,255,255,.04);
backdrop-filter:blur(20px);
opacity:0;
transform:translateY(40px);
transition:1s;
}

.cta-box.show{
opacity:1;
transform:translateY(0);
}

footer{
padding:40px;
text-align:center;
opacity:.5;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

@media(max-width:768px){
.hero h1{font-size:36px}
.nav{padding:15px 20px}
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="nav">
<div class="logo">QR Connect</div>
</div>

<section class="hero">
<h1>QR Connect</h1>
<p>Create Smart QR Business Profiles Instantly</p>
<button class="btn">Create Profile</button>
</section>

<section class="section">
<h2>Powerful Features</h2>

<div class="cards">

<div class="card">
<h3>Digital Profile</h3>
<p>Create your smart QR business profile</p>
</div>

<div class="card">
<h3>Share Anywhere</h3>
<p>Share your QR card anywhere easily</p>
</div>

<div class="card">
<h3>Analytics</h3>
<p>Track engagement and performance</p>
</div>

</div>
</section>

<section class="cta">
<div class="cta-box">
<h2>Start using QR Connect</h2>
<br>
<button class="btn">Get Started</button>
</div>
</section>

<footer>
© QR Connect 2026
</footer>

<script>
const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show")
}
})
})

document.querySelectorAll(".card,.cta-box").forEach(el=>{
observer.observe(el)
})
</script>

</body>
</html>
